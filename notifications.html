<!doctype html>
<html>
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Notifications - RentWatch BLR</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">RentWatch BLR</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="browse.html">Browse Complaints</a>
      <a href="forum.html">Forum</a>
      <a href="resources.html">Resources</a>
    </div>
  </nav>

  <main style="max-width:900px;margin:24px auto;padding:12px;">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <h1>Your Notifications</h1>
      <div id="rwBadgeSmall" style="display:none;padding:6px 10px;background:#f8fafc;color:#111;border-radius:12px;font-size:13px;border:1px solid #e6edf3"></div>
    </div>
    <p>Complaints made against you will appear here.</p>
    <div id="notifications"></div>

    <h2 style="margin-top:28px">Complaints you filed</h2>
    <p>Track complaints you submitted and verify when rectified.</p>
    <div id="myComplaints"></div>
  </main>

  <script>
    async function loadNotifications(){
      const token = localStorage.getItem('rw_token');
      if (!token) return window.location.href = '/login.html';
      const res = await fetch('/api/notifications', { headers: { 'Authorization': 'Bearer ' + token } });
      if (!res.ok) { alert('Failed to load notifications'); return; }
      const data = await res.json();
      const el = document.getElementById('notifications'); el.innerHTML='';
      if (!data || data.length===0) { el.innerHTML = '<p>No notifications</p>'; return; }
      data.forEach(n=>{
        const d = new Date(n.date);
        const node = document.createElement('div'); node.style.cssText='background:#fff;padding:12px;border-radius:8px;margin-bottom:8px;box-shadow:0 6px 18px rgba(0,0,0,0.04)';
        node.innerHTML = `<div style="display:flex;justify-content:space-between"><div><strong>${n.complainantName}</strong> <span style="color:#666">(${n.issueType})</span><div style="color:#333;margin-top:8px">${n.description}</div></div><div style="text-align:right"><div style="color:#666">${d.toLocaleString()}</div><div style="margin-top:8px">Status: <strong>${n.status}</strong></div><div style="margin-top:8px"><button data-id="${n.id}" class="resolveBtn" style="background:#16a34a;color:#fff;padding:6px;border-radius:6px;border:none;">Mark as Rectified</button></div></div></div>`;
        el.appendChild(node);
      });
      document.querySelectorAll('.resolveBtn').forEach(b=> b.onclick = async (e)=>{
        const id = e.currentTarget.dataset.id;
        const res = await fetch(`/api/complaints/${id}/resolve`, { method:'POST', headers:{ 'Authorization':'Bearer '+localStorage.getItem('rw_token') } });
        if (!res.ok) { alert('Failed to resolve'); return; }
        alert('Marked as resolved'); loadNotifications();
      });
    }

    // Load complaints filed by the current user
    async function loadMyComplaints(){
      const token = localStorage.getItem('rw_token');
      if (!token) return; // redirect handled by notifications loader
      const res = await fetch('/api/my/complaints', { headers: { 'Authorization': 'Bearer ' + token } });
      const el = document.getElementById('myComplaints'); el.innerHTML='';
      if (!res.ok) { el.innerHTML = '<p>Failed to load your complaints</p>'; return; }
      const data = await res.json();
      if (!data || data.length===0) { el.innerHTML = '<p>You have not filed any complaints</p>'; return; }
      data.forEach(c => {
        const d = new Date(c.date || c.createdAt);
        const node = document.createElement('div'); node.style.cssText='background:#fff;padding:12px;border-radius:8px;margin-bottom:8px;box-shadow:0 6px 18px rgba(0,0,0,0.04)';
        const verifiedText = c.verified ? `<div style="color:green;margin-top:8px">Verified: <strong>${new Date(c.verifiedAt).toLocaleString()}</strong></div>` : '';
        const verifyButton = (!c.verified && c.status === 'Resolved') ? `<button data-id="${c.id}" class="verifyBtn" style="background:#2563eb;color:#fff;padding:6px;border-radius:6px;border:none;margin-top:8px">Verify Rectification</button>` : '';
        node.innerHTML = `<div style="display:flex;justify-content:space-between"><div><span style="color:#666">(${c.issueType})</span><div style="color:#333;margin-top:8px">${c.description}</div>${verifiedText}</div><div style="text-align:right"><div style="color:#666">${d.toLocaleString()}</div><div style="margin-top:8px">Status: <strong>${c.status}</strong></div>${verifyButton}</div></div>`;
        el.appendChild(node);
      });
      document.querySelectorAll('.verifyBtn').forEach(b => b.onclick = async (e) => {
        const id = e.currentTarget.dataset.id;
        const r = await fetch(`/api/complaints/${id}/verify`, { method: 'POST', headers: { 'Authorization': 'Bearer ' + localStorage.getItem('rw_token') } });
        if (!r.ok) { const err = await r.json().catch(()=>null); alert('Failed to verify: ' + (err && err.error ? err.error : r.statusText)); return; }
        alert('Complaint verified. Thank you.');
        loadMyComplaints();
        loadNotifications();
      });
    }
    loadNotifications();
    loadMyComplaints();
    // populate small RentWatchBLR badge
    (function(){
      const token = localStorage.getItem('rw_token');
      const badge = document.getElementById('rwBadgeSmall');
      if (!token) { if (badge) badge.style.display='none'; return; }
      try{
        const payload = JSON.parse(atob(token.split('.')[1]));
        const idSrc = payload.id || payload._id || payload.email || payload.name || 'user';
        const short = String(idSrc).replace(/[^a-zA-Z0-9]/g,'').slice(0,6);
        badge.textContent = `RWBLR:${short}`;
        badge.style.display = 'inline-block';
      } catch(e){ if (badge) badge.style.display='none'; }
    })();
  </script>
</body>
</html>
