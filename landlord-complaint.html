<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Landlord Complaint</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .popup-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .popup-box {
      background: #fff;
      color: #22c55e;
      padding: 2em 2.5em;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.12);
      text-align: center;
      font-size: 1.2em;
    }
    .popup-box button {
      margin-top: 1.5em;
      padding: 0.6em 1.5em;
      background: #22c55e;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1em;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">RentWatch BLR</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="browse.html">Browse Complaints</a>
      <a href="forum.html">Forum</a>
      <a href="resources.html">Resources</a>
    </div>
  </nav>

  <main class="container" style="max-width:600px;margin:40px auto;">
    <h1>File a Landlord Complaint</h1>
    <form id="landlordComplaintForm">
      <div style="display:flex;gap:8px;margin-bottom:8px;">
        <select id="targetUser" required style="flex:1">
          <option value="">Select person you're complaining about</option>
        </select>
        <select name="issueType" required style="width:220px;">
        <option value="">Select Issue Type</option>
        <option>Unpaid Rent</option>
        <option>Property Damage</option>
        <option>Irresponsible Tenant</option>
        <option>Lease Violation</option>
        </select>
      <textarea name="description" placeholder="Describe your complaint..." rows="5" required></textarea>
      <button type="submit" class="green">Submit Complaint</button>
    </form>
  </main>

  <div class="popup-overlay" id="popupOverlay">
    <div class="popup-box">
      <strong>Complaint successfully registered!</strong>
      <br>Your complaint has been submitted.
      <br>
      <button onclick="closePopup()">OK</button>
    </div>
  </div>

  <footer>© 2025 RentWatch BLR</footer>
  <script>
    const form = document.getElementById('landlordComplaintForm');
    const popup = document.getElementById('popupOverlay');

    // require landlord role on page load
    (function(){
      const token = localStorage.getItem('rw_token');
      if (!token) return window.location.href = '/login.html';
      try { const payload = JSON.parse(atob(token.split('.')[1])); if (payload.role !== 'landlord') { alert('You must be logged in as a landlord to file a landlord complaint.'); window.location.href = '/'; } }
      catch(e){ window.location.href = '/login.html'; }
    })();
    // load user list
    (async function(){
      try{ const res = await fetch('/api/users'); const users = await res.json(); const sel = document.getElementById('targetUser'); users.forEach(u=>{ const opt=document.createElement('option'); opt.value=u._id||u.id; opt.textContent=`${u.name} (${u.role})`; sel.appendChild(opt); }); } catch(e){console.warn(e)}
    })();

    form.addEventListener('submit', async function(e) {
      e.preventDefault();

      const token = localStorage.getItem('rw_token');
      if (!token) return window.location.href = '/login.html';
      let payload = null;
      try { payload = JSON.parse(atob(token.split('.')[1])); } catch(e){ return window.location.href = '/login.html'; }
      const formData = {
        complainedUserId: document.getElementById('targetUser').value,
        issueType: form.issueType.value,
        description: form.description.value
      };

      try {
        const token = localStorage.getItem('rw_token');
        if (!token) return window.location.href = '/login.html';
        const headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
        const res = await fetch('http://localhost:3000/api/complaints', { method: 'POST', headers, body: JSON.stringify(formData) });
        if (res.status === 401) return window.location.href = '/login.html';
        if (!res.ok) {
          let msg = 'Network response was not ok';
          try { const json = await res.json(); if (json && json.error) msg = json.error; } catch(e){}
          throw new Error(msg);
        }

        // show popup and offer a link to browse complaints (avoid duplicate link)
        popup.style.display = 'flex';
        popup.style.zIndex = 100000;
        const box = popup.querySelector('.popup-box');
        if (!box.querySelector('.browse-link')) box.insertAdjacentHTML('beforeend', '<p class="browse-link" style="margin-top:12px;"><a href="browse.html">View all complaints</a></p>');
        form.reset();
      } catch (err) {
        alert('Failed to submit complaint. Please try again later.');
        console.error(err);
      }
    });

    function closePopup() {
      popup.style.display = 'none';
    }
  </script>
</body>
</html>
