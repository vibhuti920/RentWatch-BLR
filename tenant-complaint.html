<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tenant Complaint</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Simple popup styling */
    .popup-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .popup-box {
      background: #fff;
      color: #2563eb;
      padding: 2em 2.5em;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.12);
      text-align: center;
      font-size: 1.2em;
    }
    .popup-box button {
      margin-top: 1.5em;
      padding: 0.6em 1.5em;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1em;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">RentWatch BLR</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="browse.html">Browse Complaints</a>
      <a href="forum.html">Forum</a>
      <a href="resources.html">Resources</a>
    </div>
  </nav>

  <main class="container" style="max-width:600px;margin:40px auto;">
    <h1>File a Tenant Complaint</h1>
    <form id="complaintForm">
      <div style="display:flex;gap:8px;margin-bottom:8px;">
        <select id="targetUser" required style="flex:1">
          <option value="">Select person you're complaining about</option>
        </select>
        <select name="issueType" required style="width:220px;">
        <option value="">Select Issue Type</option>
        <option>Deposit Issue</option>
        <option>Discrimination</option>
        <option>Illegal Rent Hike</option>
        <option>Harassment</option>
        </select>
      <textarea name="description" placeholder="Describe your complaint..." rows="5" required></textarea>
      <button type="submit">Submit Complaint</button>
    </form>
  </main>

  <!-- Popup -->
  <div class="popup-overlay" id="popupOverlay">
    <div class="popup-box">
      <strong>Complaint successfully registered!</strong>
      <br>Your complaint has been submitted.
      <br>
      <button onclick="closePopup()">OK</button>
    </div>
  </div>

  <footer>© 2025 RentWatch BLR</footer>
  <script>
    const form = document.getElementById('complaintForm');
    const popup = document.getElementById('popupOverlay');
    // require tenant role on page load
    (function(){
      const token = localStorage.getItem('rw_token');
      if (!token) return window.location.href = '/login.html';
      try { const payload = JSON.parse(atob(token.split('.')[1])); if (payload.role !== 'tenant') { alert('You must be logged in as a tenant to file a tenant complaint.'); window.location.href = '/'; } }
      catch(e){ window.location.href = '/login.html'; }
    })();
    // load users for target dropdown
    (async function(){
      try{
        const res = await fetch('/api/users');
        const users = await res.json();
        const sel = document.getElementById('targetUser');
        users.forEach(u=>{
          const opt = document.createElement('option'); opt.value = u._id || u.id; opt.textContent = `${u.name} (${u.role})`; sel.appendChild(opt);
        });
      }catch(e){console.warn('Could not load users',e)}
    })();
    form.addEventListener('submit', async function(e) {
      e.preventDefault();

      const token = localStorage.getItem('rw_token');
      if (!token) return window.location.href = '/login.html';
      // derive name/email/type from token to avoid relying on removed inputs
      let payload = null;
      try { payload = JSON.parse(atob(token.split('.')[1])); } catch(e) { return window.location.href = '/login.html'; }
      const formData = {
        complainedUserId: document.getElementById('targetUser').value,
        issueType: form.issueType.value,
        description: form.description.value
      };

      try {
          const token = localStorage.getItem('rw_token');
          if (!token) return window.location.href = '/login.html';
          const headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
          const res = await fetch('http://localhost:3000/api/complaints', { method: 'POST', headers, body: JSON.stringify(formData) });
          if (res.status === 401) return window.location.href = '/login.html';
          if (!res.ok) {
            let msg = 'Network response was not ok';
            try { const json = await res.json(); if (json && json.error) msg = json.error; } catch(e){}
            throw new Error(msg);
          }
          popup.style.display = 'flex';
          popup.style.zIndex = 100000;
          form.reset();
      } catch (err) {
        alert('Failed to submit complaint. Please try again later.');
        console.error(err);
      }
    });
    function closePopup() {
      popup.style.display = 'none';
    }
  </script>
</body>
</html>
